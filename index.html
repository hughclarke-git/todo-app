<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>To do</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    #root:empty { background: linear-gradient(135deg, #f8fafc, #e0f2fe, #dbeafe); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    const APP_VERSION = '1.2.0';
    const STORAGE_KEY = 'tasks-list-v1';

    const PRIORITIES = [
      { id: 'none', label: 'No priority', icon: '○', color: 'text-slate-300' },
      { id: 'low', label: 'Low', icon: '▲', color: 'text-slate-400' },
      { id: 'med', label: 'Medium', icon: '▲', color: 'text-amber-500' },
      { id: 'high', label: 'High', icon: '▲', color: 'text-rose-500' },
    ];
    const PRIORITY_RANK = { high: 3, med: 2, low: 1, none: 0 };
    const getPriority = (id) => PRIORITIES.find(p => p.id === id) || PRIORITIES[0];

    const CONTEXTS = [
      { id: 'work', label: 'Work', dot: 'bg-sky-500', textColor: 'text-sky-700' },
      { id: 'personal', label: 'Personal', dot: 'bg-violet-500', textColor: 'text-violet-700' },
    ];
    const getContext = (id) => CONTEXTS.find(c => c.id === id) || CONTEXTS[0];

    const COLOR_TAGS = [
      { id: 'none', label: 'None', dot: 'bg-white', border: 'border-l-transparent' },
      { id: 'blue', label: 'Blue', dot: 'bg-blue-500', border: 'border-l-blue-500' },
      { id: 'teal', label: 'Teal', dot: 'bg-teal-500', border: 'border-l-teal-500' },
      { id: 'violet', label: 'Violet', dot: 'bg-violet-500', border: 'border-l-violet-500' },
      { id: 'rose', label: 'Rose', dot: 'bg-rose-500', border: 'border-l-rose-500' },
      { id: 'amber', label: 'Amber', dot: 'bg-amber-500', border: 'border-l-amber-500' },
    ];
    const getColorTag = (id) => COLOR_TAGS.find(c => c.id === id) || COLOR_TAGS[0];

    const RECURRENCE_PRESETS = [
      { id: 'none', label: 'No repeat' },
      { id: 'daily', label: 'Daily' },
      { id: 'weekly', label: 'Weekly' },
      { id: 'monthly', label: 'Monthly' },
      { id: 'custom', label: 'Custom' },
    ];

    const DURATIONS = [
      { mins: 15, label: '15 min' },
      { mins: 30, label: '30 min' },
      { mins: 60, label: '1 hour' },
      { mins: 90, label: '1.5 hr' },
      { mins: 120, label: '2 hr' },
    ];

    function describeRecurrence(rec) {
      if (!rec || rec.type === 'none') return null;
      if (rec.type === 'daily') return 'Repeats daily';
      if (rec.type === 'weekly') return 'Repeats weekly';
      if (rec.type === 'monthly') return 'Repeats monthly';
      if (rec.type === 'custom') {
        const n = rec.interval || 1;
        return n === 1 ? 'Repeats daily' : 'Repeats every ' + n + ' days';
      }
      return null;
    }

    function nextDueDate(currentDateStr, rec) {
      const baseStr = currentDateStr || new Date().toISOString().slice(0, 10);
      const base = new Date(baseStr + 'T00:00:00');
      const next = new Date(base);
      if (rec.type === 'daily') next.setDate(next.getDate() + 1);
      else if (rec.type === 'weekly') next.setDate(next.getDate() + 7);
      else if (rec.type === 'monthly') next.setMonth(next.getMonth() + 1);
      else if (rec.type === 'custom') next.setDate(next.getDate() + (rec.interval || 1));
      return next.toISOString().slice(0, 10);
    }

    // Format Date as YYYYMMDDTHHmmss for ICS in local time
    function icsDate(d) {
      const pad = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate())
        + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
    }

    function buildICS(task, startDate, durationMins) {
      const end = new Date(startDate.getTime() + durationMins * 60 * 1000);
      const uid = task.id + '-' + Date.now() + '@todo-app';
      const now = new Date();

      const escapeText = (s) => (s || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');

      let description = 'Time block for to-do task';
      if (task.notes) description += '\\n\\nNotes:\\n' + escapeText(task.notes);
      if (task.dueDate) description += '\\n\\nDue: ' + task.dueDate;

      const lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//To Do App//EN',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'BEGIN:VEVENT',
        'UID:' + uid,
        'DTSTAMP:' + icsDate(now),
        'DTSTART:' + icsDate(startDate),
        'DTEND:' + icsDate(end),
        'SUMMARY:' + escapeText(task.title),
        'DESCRIPTION:' + description,
        'STATUS:CONFIRMED',
        'TRANSP:OPAQUE',
        'END:VEVENT',
        'END:VCALENDAR'
      ];
      return lines.join('\r\n');
    }

    function downloadICS(task, startDate, durationMins) {
      const ics = buildICS(task, startDate, durationMins);
      const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const safeName = task.title.replace(/[^a-z0-9]+/gi, '-').slice(0, 40);
      a.download = safeName + '.ics';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const tasks = raw ? JSON.parse(raw) : [];
        return tasks.map(t => ({
          priority: 'none',
          context: 'work',
          recurrence: { type: 'none', interval: 1 },
          ...t,
        }));
      } catch (e) { return []; }
    }

    function saveTasks(tasks) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
      catch (e) { console.error('Save failed:', e); }
    }

    // Icons
    function NoteIcon({ className }) {
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
          <path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9h6m-6 4h6"/>
        </svg>
      );
    }

    function RepeatIcon({ className }) {
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
          <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      );
    }

    function CalendarIcon({ className }) {
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
          <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      );
    }

    // Time block popover for creating .ics events
    function TimeBlockPopover({ task, onClose }) {
      const today = new Date();
      const todayStr = today.toISOString().slice(0, 10);

      // Default to next round half-hour
      const defaultStart = new Date();
      defaultStart.setMinutes(defaultStart.getMinutes() + (30 - defaultStart.getMinutes() % 30));
      defaultStart.setSeconds(0, 0);
      const defaultTimeStr = String(defaultStart.getHours()).padStart(2, '0') + ':' + String(defaultStart.getMinutes()).padStart(2, '0');

      const [date, setDate] = useState(task.dueDate || todayStr);
      const [time, setTime] = useState(defaultTimeStr);
      const [duration, setDuration] = useState(30);

      const handleCreate = () => {
        const [hours, minutes] = time.split(':').map(Number);
        const startDate = new Date(date + 'T00:00:00');
        startDate.setHours(hours, minutes, 0, 0);
        downloadICS(task, startDate, duration);
        onClose();
      };

      return (
        <div className="mt-3 p-3 bg-sky-50 border border-sky-200 rounded-lg">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-semibold text-sky-900 flex items-center gap-1.5">
              <CalendarIcon className="w-3.5 h-3.5" />
              Block time for this task
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-lg leading-none">×</button>
          </div>

          <div className="grid grid-cols-2 gap-2 mb-3">
            <div>
              <label className="text-[11px] text-slate-600 block mb-1">Date</label>
              <input
                type="date"
                value={date}
                onChange={(e) => setDate(e.target.value)}
                className="w-full px-2 py-1.5 text-xs border border-slate-200 rounded-md bg-white text-slate-900 outline-none focus:border-sky-500"
              />
            </div>
            <div>
              <label className="text-[11px] text-slate-600 block mb-1">Start time</label>
              <input
                type="time"
                value={time}
                onChange={(e) => setTime(e.target.value)}
                className="w-full px-2 py-1.5 text-xs border border-slate-200 rounded-md bg-white text-slate-900 outline-none focus:border-sky-500"
              />
            </div>
          </div>

          <div className="mb-3">
            <label className="text-[11px] text-slate-600 block mb-1">Duration</label>
            <div className="flex gap-1 flex-wrap">
              {DURATIONS.map(d => (
                <button
                  key={d.mins}
                  onClick={() => setDuration(d.mins)}
                  className={'px-2.5 py-1 text-xs rounded-md font-medium transition-all border ' + (duration === d.mins ? 'bg-sky-500 text-white border-sky-500' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-400')}
                >
                  {d.label}
                </button>
              ))}
            </div>
          </div>

          <button
            onClick={handleCreate}
            className="w-full px-3 py-2 text-xs font-semibold bg-sky-500 text-white rounded-md hover:bg-sky-600 transition-colors flex items-center justify-center gap-1.5"
          >
            <CalendarIcon className="w-3.5 h-3.5" />
            Download calendar invite
          </button>
          <div className="text-[10px] text-slate-500 mt-2 leading-snug">
            Opens in Outlook (or your default calendar app). Click Save to add the event to your calendar.
          </div>
        </div>
      );
    }

    function App() {
      const [tasks, setTasks] = useState(() => loadTasks());
      const [view, setView] = useState('active');
      const [contextFilter, setContextFilter] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      const [blockingTaskId, setBlockingTaskId] = useState(null);
      const [quickInput, setQuickInput] = useState('');
      const [quickContext, setQuickContext] = useState('work');
      const quickInputRef = useRef(null);

      useEffect(() => { saveTasks(tasks); }, [tasks]);

      const addTask = (title) => {
        if (!title.trim()) return;
        const newTask = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title: title.trim(),
          done: false, notes: '', dueDate: '', colorTag: 'none',
          priority: 'none',
          context: quickContext,
          recurrence: { type: 'none', interval: 1 },
          createdAt: Date.now(), completedAt: null,
        };
        setTasks([newTask, ...tasks]);
        setQuickInput('');
      };

      const toggleTask = (id) => {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        if (!task.done && task.recurrence && task.recurrence.type !== 'none') {
          const newDueDate = nextDueDate(task.dueDate, task.recurrence);
          const nextInstance = {
            ...task,
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            done: false,
            dueDate: newDueDate,
            createdAt: Date.now(),
            completedAt: null,
          };
          setTasks([
            nextInstance,
            ...tasks.map(t => t.id === id ? { ...t, done: true, completedAt: Date.now() } : t),
          ]);
          return;
        }

        setTasks(tasks.map(t =>
          t.id === id ? { ...t, done: !t.done, completedAt: !t.done ? Date.now() : null } : t
        ));
      };

      const updateTask = (id, patch) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, ...patch } : t));
      };

      const deleteTask = (id) => {
        setTasks(tasks.filter(t => t.id !== id));
        if (expandedId === id) setExpandedId(null);
      };

      const handleQuickKey = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addTask(quickInput); }
      };

      useEffect(() => {
        const onKey = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            quickInputRef.current?.focus();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const formatDueDate = (dateStr) => {
        if (!dateStr) return null;
        const due = new Date(dateStr + 'T00:00:00');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const diff = Math.round((due - today) / (1000 * 60 * 60 * 24));
        if (diff < 0) return { label: Math.abs(diff) + 'd overdue', className: 'text-rose-600 font-medium', urgency: 'overdue' };
        if (diff === 0) return { label: 'Today', className: 'text-sky-700 font-semibold', urgency: 'today' };
        if (diff === 1) return { label: 'Tomorrow', className: 'text-sky-600', urgency: 'soon' };
        if (diff < 7) return { label: 'in ' + diff + 'd', className: 'text-slate-600', urgency: 'soon' };
        return {
          label: due.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
          className: 'text-slate-500', urgency: 'later'
        };
      };

      let filtered = tasks;
      if (view === 'active') filtered = filtered.filter(t => !t.done);
      else if (view === 'done') filtered = filtered.filter(t => t.done);

      if (contextFilter !== 'all') {
        filtered = filtered.filter(t => t.context === contextFilter);
      }

      if (view === 'done' && searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(t =>
          t.title.toLowerCase().includes(q) || (t.notes && t.notes.toLowerCase().includes(q))
        );
      }

      if (view === 'active') {
        filtered = [...filtered].sort((a, b) => {
          const pDiff = (PRIORITY_RANK[b.priority] || 0) - (PRIORITY_RANK[a.priority] || 0);
          if (pDiff !== 0) return pDiff;
          if (a.dueDate && !b.dueDate) return -1;
          if (!a.dueDate && b.dueDate) return 1;
          if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
          return b.createdAt - a.createdAt;
        });
      } else if (view === 'done') {
        filtered = [...filtered].sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
      }

      const activeCount = tasks.filter(t => !t.done && (contextFilter === 'all' || t.context === contextFilter)).length;
      const workCount = tasks.filter(t => !t.done && t.context === 'work').length;
      const personalCount = tasks.filter(t => !t.done && t.context === 'personal').length;

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-sky-50 to-blue-50 py-8 px-4">
          <div className="max-w-2xl mx-auto">
            <div className="flex items-baseline justify-between pb-3 mb-5 border-b border-slate-200">
              <h1 className="text-2xl font-semibold tracking-tight text-slate-900 flex items-center gap-2">
                <span className="inline-block w-2.5 h-2.5 rounded-full bg-sky-500"></span>
                To do
              </h1>
              <span className="text-sm text-slate-500">{activeCount} active</span>
            </div>

            <div className="mb-4">
              <div className="flex gap-2 items-center mb-2">
                <input
                  ref={quickInputRef}
                  type="text"
                  placeholder={'Add a ' + quickContext + ' task and hit Enter...'}
                  value={quickInput}
                  onChange={(e) => setQuickInput(e.target.value)}
                  onKeyDown={handleQuickKey}
                  autoFocus
                  className="flex-1 px-4 py-3 text-[15px] bg-white border border-slate-200 rounded-lg outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100 transition-all shadow-sm"
                />
                <span className="text-xs text-slate-400 hidden sm:inline whitespace-nowrap">⌘K to focus</span>
              </div>
              <div className="flex gap-1.5 items-center text-xs">
                <span className="text-slate-500">Adding to:</span>
                {CONTEXTS.map(c => (
                  <button
                    key={c.id}
                    onClick={() => setQuickContext(c.id)}
                    className={'px-2.5 py-1 rounded-md font-medium transition-all flex items-center gap-1.5 ' + (quickContext === c.id ? 'bg-white border border-slate-300 text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700')}
                  >
                    <span className={'w-1.5 h-1.5 rounded-full ' + c.dot}></span>
                    {c.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="flex gap-2 items-center mb-3 flex-wrap">
              <button
                onClick={() => setContextFilter('all')}
                className={'px-3 py-1.5 text-xs rounded-full font-medium transition-all border ' + (contextFilter === 'all' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-600 border-slate-200 hover:border-slate-400')}
              >
                All
              </button>
              <button
                onClick={() => setContextFilter('work')}
                className={'px-3 py-1.5 text-xs rounded-full font-medium transition-all border flex items-center gap-1.5 ' + (contextFilter === 'work' ? 'bg-sky-500 text-white border-sky-500' : 'bg-white text-slate-600 border-slate-200 hover:border-slate-400')}
              >
                <span className={'w-1.5 h-1.5 rounded-full ' + (contextFilter === 'work' ? 'bg-white' : 'bg-sky-500')}></span>
                Work {workCount > 0 && <span className="opacity-70">({workCount})</span>}
              </button>
              <button
                onClick={() => setContextFilter('personal')}
                className={'px-3 py-1.5 text-xs rounded-full font-medium transition-all border flex items-center gap-1.5 ' + (contextFilter === 'personal' ? 'bg-violet-500 text-white border-violet-500' : 'bg-white text-slate-600 border-slate-200 hover:border-slate-400')}
              >
                <span className={'w-1.5 h-1.5 rounded-full ' + (contextFilter === 'personal' ? 'bg-white' : 'bg-violet-500')}></span>
                Personal {personalCount > 0 && <span className="opacity-70">({personalCount})</span>}
              </button>
            </div>

            <div className="flex gap-1 bg-white/60 p-1 rounded-lg w-fit mb-4 border border-slate-200 shadow-sm">
              <button
                onClick={() => { setView('active'); setSearchQuery(''); }}
                className={'px-4 py-1.5 text-sm font-medium rounded-md transition-all ' + (view === 'active' ? 'bg-sky-500 text-white shadow-sm' : 'text-slate-600 hover:text-slate-900')}
              >
                Active
              </button>
              <button
                onClick={() => setView('done')}
                className={'px-4 py-1.5 text-sm font-medium rounded-md transition-all ' + (view === 'done' ? 'bg-sky-500 text-white shadow-sm' : 'text-slate-600 hover:text-slate-900')}
              >
                Done
              </button>
            </div>

            {view === 'done' && (
              <div className="mb-4">
                <input
                  type="text"
                  placeholder="Search completed tasks..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full px-3 py-2.5 text-sm bg-white border border-slate-200 rounded-lg outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100 transition-all shadow-sm"
                />
              </div>
            )}

            <div className="flex flex-col gap-1.5 min-h-[200px]">
              {filtered.length === 0 ? (
                <div className="text-center py-12 text-slate-400 text-sm bg-white/40 rounded-lg border border-slate-200 border-dashed">
                  {view === 'active' ? 'Nothing on your list. Add something above.' : searchQuery ? 'No matches.' : 'No completed tasks yet.'}
                </div>
              ) : filtered.map(task => {
                const due = formatDueDate(task.dueDate);
                const isExpanded = expandedId === task.id;
                const colorTag = getColorTag(task.colorTag);
                const hasColor = task.colorTag && task.colorTag !== 'none';
                const priority = getPriority(task.priority);
                const hasPriority = task.priority && task.priority !== 'none';
                const ctx = getContext(task.context);
                const hasNotes = task.notes && task.notes.trim().length > 0;
                const recurrenceLabel = describeRecurrence(task.recurrence);
                const isRecurring = recurrenceLabel !== null;
                const isBlocking = blockingTaskId === task.id;

                let leftBorderClass = 'border-l-transparent';
                if (due?.urgency === 'overdue') leftBorderClass = 'border-l-rose-500';
                else if (due?.urgency === 'today') leftBorderClass = 'border-l-sky-500';
                else if (hasColor) leftBorderClass = colorTag.border;

                return (
                  <div
                    key={task.id}
                    className={'flex items-start gap-3 p-3 rounded-lg cursor-pointer transition-all bg-white border border-slate-200 border-l-4 ' + leftBorderClass + ' shadow-sm hover:shadow-md ' + (isExpanded ? 'shadow-md ring-2 ring-sky-100' : '')}
                    onClick={(e) => {
                      if (e.target.closest('.checkbox-area') || e.target.closest('.details-area')) return;
                      setExpandedId(isExpanded ? null : task.id);
                    }}
                  >
                    <div
                      className="checkbox-area pt-0.5"
                      onClick={(e) => { e.stopPropagation(); toggleTask(task.id); }}
                    >
                      <div className={'w-[18px] h-[18px] border-[1.5px] rounded flex items-center justify-center transition-all ' + (task.done ? 'bg-sky-500 border-sky-500' : 'bg-white border-slate-300 hover:border-sky-500')}>
                        {task.done && (
                          <svg className="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                          </svg>
                        )}
                      </div>
                    </div>

                    <div className="flex-1 min-w-0">
                      <div className="flex items-start gap-2">
                        {hasPriority && (
                          <span className={'text-xs leading-snug pt-0.5 ' + priority.color} title={priority.label + ' priority'}>
                            {priority.icon}
                          </span>
                        )}
                        <div className={'text-[15px] leading-snug break-words flex-1 ' + (task.done ? 'text-slate-400 line-through' : 'text-slate-900')}>
                          {task.title}
                        </div>
                        <div className="flex items-center gap-1.5 flex-shrink-0">
                          {isRecurring && (
                            <span
                              className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-teal-50 text-teal-700 rounded text-[10px] font-medium border border-teal-200"
                              title={recurrenceLabel}
                            >
                              <RepeatIcon className="w-3 h-3" />
                            </span>
                          )}
                          {hasNotes && (
                            <span
                              className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-amber-50 text-amber-700 rounded text-[10px] font-medium border border-amber-200"
                              title="Has notes"
                            >
                              <NoteIcon className="w-3 h-3" />
                              Notes
                            </span>
                          )}
                        </div>
                      </div>

                      <div className="flex gap-2.5 items-center mt-1 text-xs flex-wrap">
                        <span className={'flex items-center gap-1 ' + ctx.textColor}>
                          <span className={'w-1.5 h-1.5 rounded-full ' + ctx.dot}></span>
                          {ctx.label}
                        </span>
                        {due && <span className={due.className}>{due.label}</span>}
                        {hasColor && <span className={'w-2 h-2 rounded-full ' + colorTag.dot}></span>}
                      </div>

                      {/* Quick Block button - shown when not expanded */}
                      {!isExpanded && !task.done && (
                        <div className="mt-2" onClick={(e) => e.stopPropagation()}>
                          <button
                            onClick={() => setBlockingTaskId(isBlocking ? null : task.id)}
                            className={'inline-flex items-center gap-1 px-2 py-0.5 text-[11px] rounded-md font-medium transition-all border ' + (isBlocking ? 'bg-sky-500 text-white border-sky-500' : 'bg-white text-sky-700 border-sky-200 hover:border-sky-400 hover:bg-sky-50')}
                          >
                            <CalendarIcon className="w-3 h-3" />
                            Block time
                          </button>
                        </div>
                      )}

                      {isBlocking && !isExpanded && (
                        <div onClick={(e) => e.stopPropagation()}>
                          <TimeBlockPopover task={task} onClose={() => setBlockingTaskId(null)} />
                        </div>
                      )}

                      {isExpanded && (
                        <div
                          className="details-area mt-3 pt-3 border-t border-slate-200"
                          onClick={(e) => e.stopPropagation()}
                        >
                          {/* Block time button at top of expanded panel */}
                          {!task.done && (
                            <div className="mb-3">
                              <button
                                onClick={() => setBlockingTaskId(isBlocking ? null : task.id)}
                                className={'inline-flex items-center gap-1.5 px-3 py-1.5 text-xs rounded-md font-medium transition-all border ' + (isBlocking ? 'bg-sky-500 text-white border-sky-500' : 'bg-white text-sky-700 border-sky-200 hover:border-sky-400 hover:bg-sky-50')}
                              >
                                <CalendarIcon className="w-3.5 h-3.5" />
                                Block time on calendar
                              </button>
                              {isBlocking && (
                                <TimeBlockPopover task={task} onClose={() => setBlockingTaskId(null)} />
                              )}
                            </div>
                          )}

                          <div className="flex gap-3 items-center mb-3 flex-wrap">
                            <label className="text-xs text-slate-600 min-w-[60px]">Context</label>
                            <div className="flex gap-1">
                              {CONTEXTS.map(c => (
                                <button
                                  key={c.id}
                                  onClick={() => updateTask(task.id, { context: c.id })}
                                  className={'px-2.5 py-1 text-xs rounded-md font-medium transition-all flex items-center gap-1.5 border ' + (task.context === c.id ? 'bg-slate-100 border-slate-300 text-slate-900' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-400')}
                                >
                                  <span className={'w-1.5 h-1.5 rounded-full ' + c.dot}></span>
                                  {c.label}
                                </button>
                              ))}
                            </div>
                          </div>

                          <div className="flex gap-3 items-center mb-3 flex-wrap">
                            <label className="text-xs text-slate-600 min-w-[60px]">Priority</label>
                            <div className="flex gap-1">
                              {PRIORITIES.map(p => (
                                <button
                                  key={p.id}
                                  onClick={() => updateTask(task.id, { priority: p.id })}
                                  className={'px-2.5 py-1 text-xs rounded-md font-medium transition-all flex items-center gap-1 border ' + (task.priority === p.id ? 'bg-slate-100 border-slate-300 text-slate-900' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-400')}
                                >
                                  <span className={p.color}>{p.icon}</span>
                                  {p.label}
                                </button>
                              ))}
                            </div>
                          </div>

                          <div className="flex gap-3 items-center mb-3 flex-wrap">
                            <label className="text-xs text-slate-600 min-w-[60px]">Due</label>
                            <input
                              type="date"
                              value={task.dueDate || ''}
                              onChange={(e) => updateTask(task.id, { dueDate: e.target.value })}
                              className="px-2 py-1.5 text-xs border border-slate-200 rounded-md bg-white text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-200"
                            />
                            {task.dueDate && (
                              <button
                                onClick={() => updateTask(task.id, { dueDate: '' })}
                                className="px-3 py-1 text-xs border border-slate-200 rounded-md bg-white text-slate-600 hover:bg-slate-50"
                              >
                                Clear
                              </button>
                            )}
                          </div>

                          <div className="flex gap-3 items-start mb-3 flex-wrap">
                            <label className="text-xs text-slate-600 min-w-[60px] pt-1">Repeat</label>
                            <div className="flex flex-col gap-2">
                              <div className="flex gap-1 flex-wrap">
                                {RECURRENCE_PRESETS.map(r => (
                                  <button
                                    key={r.id}
                                    onClick={() => updateTask(task.id, {
                                      recurrence: { ...task.recurrence, type: r.id }
                                    })}
                                    className={'px-2.5 py-1 text-xs rounded-md font-medium transition-all flex items-center gap-1 border ' + (task.recurrence?.type === r.id ? 'bg-teal-50 border-teal-300 text-teal-800' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-400')}
                                  >
                                    {r.id !== 'none' && <RepeatIcon className="w-3 h-3" />}
                                    {r.label}
                                  </button>
                                ))}
                              </div>
                              {task.recurrence?.type === 'custom' && (
                                <div className="flex items-center gap-2 text-xs text-slate-600">
                                  <span>Every</span>
                                  <input
                                    type="number"
                                    min="1"
                                    max="365"
                                    value={task.recurrence?.interval || 1}
                                    onChange={(e) => updateTask(task.id, {
                                      recurrence: { type: 'custom', interval: Math.max(1, parseInt(e.target.value) || 1) }
                                    })}
                                    className="w-16 px-2 py-1 border border-slate-200 rounded-md bg-white text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-200"
                                  />
                                  <span>day{(task.recurrence?.interval || 1) > 1 ? 's' : ''}</span>
                                </div>
                              )}
                              {task.recurrence?.type !== 'none' && (
                                <div className="text-[11px] text-slate-500 italic">
                                  When ticked, a new copy will appear with the next due date.
                                </div>
                              )}
                            </div>
                          </div>

                          <div className="flex gap-3 items-center mb-3 flex-wrap">
                            <label className="text-xs text-slate-600 min-w-[60px]">Colour</label>
                            <div className="flex gap-1.5">
                              {COLOR_TAGS.map(c => (
                                <button
                                  key={c.id}
                                  onClick={() => updateTask(task.id, { colorTag: c.id })}
                                  title={c.label}
                                  className={'w-6 h-6 rounded-full border-2 transition-all flex items-center justify-center ' + (task.colorTag === c.id ? 'border-slate-900 scale-110' : 'border-slate-200 hover:border-slate-400') + ' ' + c.dot}
                                >
                                  {c.id === 'none' && (
                                    <svg className="w-3 h-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                  )}
                                </button>
                              ))}
                            </div>
                          </div>

                          <div className="flex items-center gap-2 mb-1.5">
                            <label className="text-xs text-slate-600 flex items-center gap-1">
                              <NoteIcon className="w-3.5 h-3.5" />
                              Notes
                            </label>
                          </div>
                          <textarea
                            placeholder="Add notes..."
                            value={task.notes || ''}
                            onChange={(e) => updateTask(task.id, { notes: e.target.value })}
                            className="w-full min-h-[70px] p-2.5 text-[13px] leading-relaxed border border-slate-200 rounded-md bg-white text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-200 resize-y font-sans"
                          />

                          <div className="flex gap-2 mt-3">
                            <button
                              onClick={() => deleteTask(task.id)}
                              className="px-3 py-1.5 text-xs border border-slate-200 rounded-md bg-white text-slate-600 hover:text-rose-600 hover:border-rose-400 transition-colors"
                            >
                              Delete
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="mt-8 text-center text-xs text-slate-400">
              <div>Tap any task to expand. Your data is saved automatically.</div>
              <div className="mt-1 opacity-60">v{APP_VERSION}</div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.update();
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker?.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) { refreshing = true; window.location.reload(); }
          });
        }).catch(err => console.log('SW failed:', err));
      });
    }
  </script>
</body>
</html>
